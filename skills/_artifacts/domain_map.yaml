  - from: "set-up-detection-pipeline"
    to: "handle-frame-coordinates"
    reason: "Every detection pipeline needs a capturer and reverse transform; the choice of letterbox vs stretch is part of pipeline setup."
  - from: "set-up-detection-pipeline"
    to: "configure-yolo-postprocess"
    reason: "First-pass setup uses defaults; the moment a different YOLO version is loaded, postprocess tuning becomes the next skill the agent needs."
  - from: "set-up-detection-pipeline"
    to: "set-up-onnx-runtime"
    reason: "createYoloDetector wraps initSession + preprocessing; debugging session-level issues (backend choice, SSR) requires the runtime-setup mental model."
  - from: "integrate-tracking"
    to: "handle-frame-coordinates"
    reason: "Tracker assumes stable per-frame coordinate space; reverse transforms must be applied before update() for IDs to be meaningful in source space."
  - from: "integrate-tracking"
    to: "set-up-detection-pipeline"
    reason: "Tracking is a layer ON TOP of detection; the agent should master the detection happy path before adding state."
  - from: "configure-yolo-postprocess"
    to: "set-up-detection-pipeline"
    reason: "Postprocess tuning rarely stands alone; the agent reaches for it when the detection pipeline yields zero results or shape errors."
  - from: "set-up-onnx-runtime"
    to: "set-up-detection-pipeline"
    reason: "Non-YOLO ONNX usage shares preprocess + session primitives with the YOLO pipeline; patterns transfer in both directions."
  - from: "suppress-static-detections"
    to: "handle-frame-coordinates"
    reason: "suppressStatic must run in background-model pixel space BEFORE the reverse transform; placing it correctly requires the source↔model space round-trip mental model."
  - from: "suppress-static-detections"
    to: "set-up-detection-pipeline"
    reason: "Background subtraction slots into the detect loop right after detect(); it reuses the same letterboxed frame and detection-space boxes."
  - from: "suppress-static-detections"
    to: "integrate-tracking"
    reason: "Suppression runs just before tracking and feeds the same Detection[]; the attenuated, re-thresholded output is what tracker.update should receive."
  - from: "integrate-tracking"
    to: "suppress-static-detections"
    reason: "Persistent ghost tracks on static scenery are often best fixed upstream by attenuating static detections before update()."
  - from: "count-line-crossings"
    to: "integrate-tracking"
    reason: "Crossing counts require stable trackIds; the counter runs right after tracker.update and is only as good as the IDs it receives."
  - from: "count-line-crossings"
    to: "handle-frame-coordinates"
    reason: "The counter does no scaling — its points and line endpoints must share one coordinate space, which is the space round-trip that skill governs."
  - from: "count-line-crossings"
    to: "suppress-static-detections"
    reason: "Both are post-detection/post-tracking consumers in the same loop; suppression runs before tracking, crossing-counting after."
  - from: "integrate-tracking"
    to: "count-line-crossings"
    reason: "Counting line crossings is a common downstream of tracking; the trackId stability the tracker provides directly determines crossing accuracy."

