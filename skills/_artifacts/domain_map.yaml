library:
  name: "@pj-hoakari/web-crowd-detection-utils"
  version: "0.0.0"
  repository: "https://github.com/pj-hoakari/web-crowd-detection-utils"
  description: "Browser-targeted TypeScript building blocks for YOLO + ByteTrack crowd / person detection. Exposes six subpaths (onnx, yolo, source, bytetrack, background, line-crossing) that compose into a full detect-track-and-count pipeline with optional static-detection suppression."
  primary_framework: "framework-agnostic"

domains:
  - name: "Detection pipeline"
    slug: "detection-pipeline"
    description: "Composing preprocess, inference, and postprocess to turn a frame into Detection[]. Spans the yolo subpath plus its dependency on onnx primitives."
  - name: "Frame acquisition"
    slug: "frame-acquisition"
    description: "Getting browser frames into the model's expected shape (letterbox vs stretch) and round-tripping detection coordinates back to source space."
  - name: "Multi-object tracking"
    slug: "multi-object-tracking"
    description: "Turning per-frame Detection[] into stable, ID-bearing tracks via the detector-agnostic BYTETracker, including occlusion / re-identification semantics."
  - name: "Runtime setup"
    slug: "runtime-setup"
    description: "Initializing onnxruntime-web sessions in a browser-safe way (WebGPU vs WASM, SSR safety, preprocess buffer ownership) for both YOLO and non-YOLO models."
  - name: "Static-detection suppression"
    slug: "static-suppression"
    description: "Reducing false positives on static scenery by attenuating the confidence of detections that don't move, via the detector-agnostic EMA background model. Sits between detection and tracking, operating on its own ScoredBox in background-model pixel space."
  - name: "Line-crossing counting"
    slug: "line-crossing-counting"
    description: "Counting tracked objects that cross virtual lines, with per-direction tallies, via the detector- and tracker-agnostic LineCrossingCounter. A post-tracking stage that operates on caller-anchored points in a coordinate space shared with the lines; drawing is out of scope."

skills:
  - name: "Set up a YOLO detection pipeline"
    slug: "set-up-detection-pipeline"
    domain: "detection-pipeline"
    description: "First-time path: take an ONNX model URL or buffer, a video / image source, and produce per-frame Detection[] in source-image space. Covers the happy-path wiring of createYoloDetector + a capturer + a reverse-transform."
    type: "core"
    covers:
      - "createYoloDetector"
      - "createLetterboxCapturer (paired)"
      - "reverseLetterboxBoxes (paired)"
      - "Detection type (model-input space caveat)"
      - "YoloDetectorOptions (modelPath, executionProvider, inputSize, postprocess, preprocessBuffer)"
    tasks:
      - "Run YOLOv8 / v11 / v26 detection on a webcam stream"
      - "Run detection on a video file or single image"
      - "Choose executionProvider (webgpu vs wasm) and implement manual fallback"
      - "Reuse a preprocess buffer across the detection loop"
    failure_modes:
      - mistake: "Default format mismatches Ultralytics standard export"
        mechanism: "DEFAULT_FORMAT is 'end-to-end' but a plain Ultralytics export emits standard [1, attrs, N]. The postprocess throws 'tensor shape ... does not match requested format'."
        wrong_pattern: |
          const detector = await createYoloDetector({
            modelPath: "/models/yolov8n.onnx",
            executionProvider: "webgpu",
          });
          await detector.detect(imageData); // throws on shape mismatch
        correct_pattern: |
          const detector = await createYoloDetector({
            modelPath: "/models/yolov8n.onnx",
            executionProvider: "webgpu",
            postprocess: { format: "auto" }, // auto-detect, matches both examples
          });
        source: "src/yolo/postprocess.ts:299 (shapeMismatch), examples use format:'auto'"
        priority: "CRITICAL"
        status: "active"
        version_context: "Library default is 'end-to-end' to favor production-grade NMS-included exports; agents trained on Ultralytics quickstart docs will skip 'format' entirely."
        skills: ["set-up-detection-pipeline", "configure-yolo-postprocess"]
      - mistake: "Drawing detections without applying reverse transform"
        mechanism: "createYoloDetector returns coordinates in model input space (0..inputSize). Drawing them on a source-sized canvas places boxes in the top-left corner and at wrong scale."
        wrong_pattern: |
          const dets = await detector.detect(imageData);
          for (const d of dets) ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
          // boxes drawn in 0..640 space onto a 1280x720 canvas
        correct_pattern: |
          const { imageData, params } = capturer.capture(video);
          const dets = await detector.detect(imageData);
          const sourceSpace = reverseLetterboxBoxes(dets, params);
          for (const d of sourceSpace) ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
        source: "src/yolo/detector.ts:32-38, src/yolo/types.ts:9-13 (Detection)"
        priority: "CRITICAL"
        status: "active"
        skills: ["set-up-detection-pipeline", "handle-frame-coordinates"]
      - mistake: "Assuming WebGPU automatically falls back to WASM"
        mechanism: "initSession does NOT auto-fallback. If 'webgpu' is requested but navigator.gpu is missing, it throws synchronously. Agents commonly skip the try/catch."
        wrong_pattern: |
          const detector = await createYoloDetector({
            modelPath,
            executionProvider: "webgpu",
            // no fallback; throws on Safari, SSR, Firefox without flag
          });
        correct_pattern: |
          const preferred = isWebGpuAvailable() ? "webgpu" : "wasm";
          try {
            return await createYoloDetector({ modelPath, executionProvider: preferred, ... });
          } catch (err) {
            if (preferred !== "webgpu") throw err;
            return createYoloDetector({ modelPath, executionProvider: "wasm", ... });
          }
        source: "src/onnx/session.ts:35-39, example/yolo-webcam/src/detection.ts (manual fallback)"
        priority: "HIGH"
        status: "active"
        skills: ["set-up-detection-pipeline", "set-up-onnx-runtime"]
      - mistake: "Calling initSession or createYoloDetector at module top level"
        mechanism: "Dynamic import('onnxruntime-web/webgpu') runs on first call to keep the module SSR-safe. Hoisting the call to module scope (or running it under Next.js getServerSideProps) breaks SSR by triggering navigator.gpu access on the server."
        wrong_pattern: |
          // module.ts — runs at import time
          export const detector = await createYoloDetector({
            modelPath,
            executionProvider: "webgpu",
          });
        correct_pattern: |
          // module.ts — defer until browser-side event
          export async function getDetector() {
            return createYoloDetector({ modelPath, executionProvider: "webgpu" });
          }
          // call from useEffect / event handler, not from SSR render
        source: "src/onnx/session.ts:17-23 (@remarks SSR-safe), src/onnx/backend.ts:11"
        priority: "HIGH"
        status: "active"
        skills: ["set-up-detection-pipeline", "set-up-onnx-runtime"]
      - mistake: "Feeding mis-sized ImageData to detect()"
        mechanism: "rgbaToFloat32Chw assumes imageData.width / height equal inputSize. The library only validates buffer length, not image dimensions, so a wrong-size ImageData silently corrupts the input tensor."
        wrong_pattern: |
          const ctx = videoCanvas.getContext("2d");
          const imageData = ctx.getImageData(0, 0, video.videoWidth, video.videoHeight);
          await detector.detect(imageData); // silently wrong if video is not inputSize×inputSize
        correct_pattern: |
          const capturer = createLetterboxCapturer({ inputSize: 640 });
          const { imageData, params } = capturer.capture(video);
          await detector.detect(imageData);
        source: "src/onnx/preprocess.ts:32-39 (@param contract), src/yolo/detector.ts:30-33"
        priority: "HIGH"
        status: "active"
        skills: ["set-up-detection-pipeline", "handle-frame-coordinates"]

  - name: "Tune YOLO postprocess for your model export"
    slug: "configure-yolo-postprocess"
    domain: "detection-pipeline"
    description: "Pick the right OutputFormat, thresholds, NMS settings, and classFilter for the specific YOLO export you're loading. Distinct from set-up-detection-pipeline because users hit this when their first-pass setup yields no detections, the wrong class, or a shape-mismatch error."
    type: "core"
    covers:
      - "OutputFormat (auto / end-to-end / end-to-end-transposed / standard / standard-transposed)"
      - "postprocess (low-level)"
      - "nms (low-level, class-agnostic)"
      - "DEFAULT_CONF_THRESHOLD, DEFAULT_IOU_THRESHOLD, DEFAULT_MAX_DETECTIONS, DEFAULT_CLASS_FILTER"
      - "sigmoid auto-detection in standard format"
    tasks:
      - "Switch from default 'end-to-end' to 'auto' when loading a stock Ultralytics export"
      - "Lower confThreshold or remove classFilter to debug zero detections"
      - "Run NMS as a standalone utility on detections from a foreign decoder"
      - "Use a custom-trained model where class 0 is not 'person'"
    failure_modes:
      - mistake: "Default classFilter silently drops every non-person detection"
        mechanism: "DEFAULT_CLASS_FILTER is [0] (COCO person). For a custom-trained model where class 0 means something else, or when the user wants all classes, results look 'empty' until classFilter is overridden."
        wrong_pattern: |
          // Custom multi-class model — agent assumes default keeps all classes
          const detector = await createYoloDetector({
            modelPath: "/models/coco-vehicles.onnx",
            executionProvider: "webgpu",
            postprocess: { format: "auto" },
          });
          // result: only classId === 0 boxes; everything else dropped
        correct_pattern: |
          const detector = await createYoloDetector({
            modelPath: "/models/coco-vehicles.onnx",
            executionProvider: "webgpu",
            postprocess: { format: "auto", classFilter: "all" }, // or specific allow-list
          });
        source: "src/yolo/postprocess.ts:19-24 (DEFAULT_CLASS_FILTER), src/yolo/types.ts:78-83"
        priority: "HIGH"
        status: "active"
      - mistake: "Manually applying nms() after end-to-end postprocess"
        mechanism: "End-to-end and end-to-end-transposed formats are NMS-applied by the model's exported plugin. Running nms() again over the result is redundant and can drop valid detections via cross-class IoU suppression."
        wrong_pattern: |
          const raw = postprocess(output, { format: "end-to-end" });
          const filtered = nms(raw, { iouThreshold: 0.4 }); // double NMS
        correct_pattern: |
          // Format already includes NMS — use postprocess output directly.
          const dets = postprocess(output, { format: "end-to-end" });
        source: "src/yolo/types.ts:33-39 (OutputFormat semantics), src/yolo/nms.ts:40-42 (class-agnostic note)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Setting confThreshold but expecting all candidates back"
        mechanism: "In end-to-end formats, confThreshold filters AND the iteration breaks once maxDetections is hit. Lowering confThreshold past the model's score floor still caps at maxDetections (default 30)."
        wrong_pattern: |
          // Trying to count crowds of >30 people
          const detector = await createYoloDetector({
            modelPath, executionProvider: "webgpu",
            postprocess: { format: "auto", confThreshold: 0.05 },
            // maxDetections defaults to 30 — silently capped
          });
        correct_pattern: |
          const detector = await createYoloDetector({
            modelPath, executionProvider: "webgpu",
            postprocess: { format: "auto", confThreshold: 0.05, maxDetections: 300 },
          });
        source: "src/yolo/postprocess.ts:53-81 (postprocessEndToEnd break), src/yolo/nms.ts:7 (DEFAULT_MAX_DETECTIONS)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Overriding sigmoid handling by feeding pre-activated logits"
        mechanism: "postprocessStandard auto-detects whether class scores are raw logits vs sigmoided by sampling. Pre-running sigmoid in user code OR forcing 'standard' on an already-sigmoided export confuses the heuristic only at extreme values, but is a footgun when users 'help' the library."
        wrong_pattern: |
          // Tensor preprocessed externally to apply sigmoid before postprocess
          const sigmoided = applySigmoid(output);
          const dets = postprocess(sigmoided, { format: "standard" });
        correct_pattern: |
          // Pass the raw model output as-is; auto-detection handles it.
          const dets = postprocess(output, { format: "auto" });
        source: "src/yolo/postprocess.ts:113-122 (needsSigmoid sampling)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Blind trust in `format: \"auto\"` on edge-shape models"
        mechanism: "dispatchAuto picks the decoder from dim positions: dim2===6 → end-to-end, dim1===6 → end-to-end-transposed, dim1<dim2 → standard, dim1>dim2 → standard-transposed. This misfires on (a) a 2-class standard export where attrs=4+2=6 looks identical to end-to-end-transposed [1, 6, N], (b) models where N is unusually small and ordering ambiguity bites the dim1 vs dim2 comparison, (c) non-Ultralytics exports (YOLOv9 / YOLO-NAS / RT-DETR) whose shapes don't match any branch. The console.warn for unrecognized shapes is easy to miss in production logs."
        wrong_pattern: |
          // 2-class custom model with standard layout [1, 6, 8400]
          // → 'auto' picks end-to-end-transposed, decodes garbage
          const detector = await createYoloDetector({
            modelPath: "/models/custom-2class.onnx",
            executionProvider: "webgpu",
            postprocess: { format: "auto" },
          });
        correct_pattern: |
          // Pin the format explicitly once the model export pipeline is known.
          const detector = await createYoloDetector({
            modelPath: "/models/custom-2class.onnx",
            executionProvider: "webgpu",
            postprocess: { format: "standard" },
          });
          // Or for an unknown / dev model, verify dispatchAuto's [yolo] console log
          // matches the actual export before locking it in.
        source: "src/yolo/postprocess.ts:202-242 (dispatchAuto heuristic + logAutoFormat once-per-page), maintainer interview"
        priority: "HIGH"
        status: "active"

  - name: "Round-trip frame coordinates between source and model space"
    slug: "handle-frame-coordinates"
    domain: "frame-acquisition"
    description: "Decide between letterbox (aspect-preserving with padding) and stretch (non-aspect-preserving) capture, and apply the matching reverse transform. Distinct from set-up-detection-pipeline because the choice affects detection accuracy and the two transforms are NOT interchangeable."
    type: "core"
    covers:
      - "createLetterboxCapturer + reverseLetterboxBox / reverseLetterboxBoxes"
      - "createCanvasFrameCapturer + reverseStretchBox"
      - "computeLetterboxParams"
      - "LetterboxParams (scale, padX, padY, contentWidth, contentHeight)"
      - "CaptureSource (HTMLVideoElement, HTMLImageElement, VideoFrame, OffscreenCanvas)"
      - "CaptureCanvas (HTMLCanvasElement | OffscreenCanvas — capturer.canvas return type; capturers run in Web Workers via OffscreenCanvas; narrow with instanceof for captureStream())"
    tasks:
      - "Choose between letterbox and stretch for a given source aspect ratio"
      - "Map detection coordinates back to source-image space for rendering"
      - "Handle a video element whose resolution changes mid-stream"
      - "Run detection on a single image instead of a video"
    failure_modes:
      - mistake: "Mismatched capturer / reverse-transform pair"
        mechanism: "createLetterboxCapturer pads to preserve aspect; createCanvasFrameCapturer stretches. The reverse functions are NOT interchangeable — using reverseStretchBox on letterboxed boxes silently produces shifted, oversized boxes."
        wrong_pattern: |
          const capturer = createLetterboxCapturer({ inputSize: 640 });
          const { imageData } = capturer.capture(video);
          const dets = await detector.detect(imageData);
          // Wrong: stretch reverse on letterbox capture
          const sourceSpace = dets.map((d) =>
            reverseStretchBox(d, video.videoWidth, video.videoHeight, 640)
          );
        correct_pattern: |
          const capturer = createLetterboxCapturer({ inputSize: 640 });
          const { imageData, params } = capturer.capture(video);
          const dets = await detector.detect(imageData);
          const sourceSpace = reverseLetterboxBoxes(dets, params);
        source: "src/source/letterbox.ts:212-216 (@remarks pairing constraint)"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Capturing before HTMLVideoElement metadata loads"
        mechanism: "LetterboxCapturer.capture re-reads source.videoWidth/Height per call. Before 'loadedmetadata' those are 0, throwing 'source dimensions must be positive finite numbers'."
        wrong_pattern: |
          video.src = url;
          // No await on metadata
          const { imageData, params } = capturer.capture(video); // throws
        correct_pattern: |
          video.src = url;
          await video.play(); // implicit metadata wait
          // or explicit: await new Promise((r) => video.addEventListener("loadedmetadata", r, { once: true }));
          const { imageData, params } = capturer.capture(video);
        source: "src/source/letterbox.ts:172-181 (throw + remark on HTMLVideoElement)"
        priority: "HIGH"
        status: "active"
      - mistake: "Caching LetterboxParams across frames"
        mechanism: "Capturer re-computes params every capture(). Agents who 'optimize' by caching params lose correctness when source dimensions change (e.g. orientation flip, adaptive bitrate)."
        wrong_pattern: |
          const { params } = capturer.capture(video);
          // ... many frames later, video rotated
          const sourceSpace = reverseLetterboxBoxes(dets, params); // wrong scale
        correct_pattern: |
          // Always use params from THIS frame's capture.
          const { imageData, params } = capturer.capture(video);
          const dets = await detector.detect(imageData);
          const sourceSpace = reverseLetterboxBoxes(dets, params);
        source: "src/source/letterbox.ts:139-141 (@remarks per-call re-evaluation)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Using stretch capture when aspect matters"
        mechanism: "createCanvasFrameCapturer non-uniformly stretches the source to width × height. With non-square models (inputSize 640×640) this distorts boxes proportionally to source aspect ratio, hurting detection recall on wide / tall sources."
        wrong_pattern: |
          // Wide 1920x1080 source forced into 640x640 — heavy horizontal squish
          const capturer = createCanvasFrameCapturer({ width: 640, height: 640 });
        correct_pattern: |
          // Letterbox preserves aspect with gray padding (YOLO standard)
          const capturer = createLetterboxCapturer({ inputSize: 640 });
        source: "src/source/capture.ts:14-17 (@remarks 'stretched'), src/source/types.ts:19-31 (CanvasFrameCapturerOptions / 'stretched')"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Calling captureStream() on capturer.canvas without narrowing"
        mechanism: "Since the OffscreenCanvas change, capturer.canvas is CaptureCanvas (HTMLCanvasElement | OffscreenCanvas). OffscreenCanvas has no captureStream(), so an unguarded call fails to type-check and throws at runtime whenever the capturer took the OffscreenCanvas path (always, inside a Worker)."
        wrong_pattern: |
          const capturer = createLetterboxCapturer({ inputSize: 640 });
          // captureStream() exists only on HTMLCanvasElement
          const stream = capturer.canvas.captureStream(); // TS error; throws on OffscreenCanvas
        correct_pattern: |
          const { canvas } = capturer;
          if (canvas instanceof HTMLCanvasElement) {
            const stream = canvas.captureStream();
            // ...
          } else {
            // OffscreenCanvas (worker / any thread with the constructor): captureStream() unavailable
          }
        source: "src/source/types.ts:49-58, 137-148 (@remarks narrow with instanceof), src/source/canvas.ts:47-82"
        priority: "HIGH"
        status: "active"
        version_context: "Introduced by the 2026-06-12 OffscreenCanvas change (commit a11c5d0); capturer.canvas was HTMLCanvasElement before that."

  - name: "Integrate ByteTrack for stable IDs and crowd counting"
    slug: "integrate-tracking"
    domain: "multi-object-tracking"
    description: "Wrap per-frame Detection[] with BYTETracker to get persistent trackIds, then use totalCount or a Set<trackId> for unique-people counting. Distinct skill because the tracker is stateful and its coordinate-space assumptions, lifecycle, and pass-through semantics are subtle. Multi-class tracking is supported by creating one BYTETracker instance per classId (the tracker itself is class-agnostic and will let cross-class IoU overlaps swap IDs)."
    type: "core"
    covers:
      - "BYTETracker (constructor, update, reset, totalCount)"
      - "Observation / TrackedBox (structural compatibility with Detection — Detection is passed without remap)"
      - "TrackState (New / Tracked / Lost / Removed)"
      - "BYTETrackerOptions (highThresh, matchThresh, secondMatchThresh, trackBuffer, etc.)"
      - "3-stage cascade behavior"
      - "Per-class tracker pattern for multi-class detectors"
    tasks:
      - "Count unique people seen in a video"
      - "Tune trackBuffer for longer / shorter occlusions"
      - "Track multiple classes with one BYTETracker per class"
      - "Reset the tracker between independent clips while keeping the detector"
    failure_modes:
      - mistake: "Calling tracker.update with model-space detections"
        mechanism: "BYTETracker assumes input is in a single, stable coordinate space across frames. Passing model-space detections produces IDs that drift if the source resolution changes, and crowd counts that don't match the rendered canvas."
        wrong_pattern: |
          const dets = await detector.detect(imageData);
          const tracked = tracker.update(dets); // model space — fine ONLY if source dims fixed
          for (const t of tracked) ctx.strokeRect(t.x1, t.y1, t.x2 - t.x1, t.y2 - t.y1);
        correct_pattern: |
          const { imageData, params } = capturer.capture(video);
          const dets = await detector.detect(imageData);
          const sourceSpace = reverseLetterboxBoxes(dets, params);
          const tracked = tracker.update(sourceSpace);
        source: "example/yolo-bytetrack-video/src/detection.ts:50-54 (canonical order)"
        priority: "CRITICAL"
        status: "active"
        skills: ["integrate-tracking", "handle-frame-coordinates"]
      - mistake: "Re-instantiating BYTETracker per frame"
        mechanism: "BYTETracker is stateful — track history lives in the instance. Allocating one per frame produces fresh IDs every frame and breaks unique counting."
        wrong_pattern: |
          for (const frame of frames) {
            const tracker = new BYTETracker(); // resets every frame
            const tracked = tracker.update(dets);
            uniqueIds.add(tracked[0].trackId); // always 1, 1, 1...
          }
        correct_pattern: |
          const tracker = new BYTETracker(); // once
          for (const frame of frames) {
            const tracked = tracker.update(dets);
            for (const t of tracked) uniqueIds.add(t.trackId);
          }
        source: "src/bytetrack/tracker.ts:55-86 (instance fields), example detection.ts:38"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Forgetting that update mutates and pass-through fields preserve"
        mechanism: "Two subtle semantics: (1) update mutates internal lists, not a pure function. (2) Extra fields on the Observation subtype (e.g. classId) are shallow-copied onto each TrackedBox, but the canonical x1/y1/x2/y2/score/trackId override any same-named input."
        wrong_pattern: |
          const dets: Detection[] = await detector.detect(imageData);
          const snapshot = [...dets];
          const tracked = tracker.update(dets);
          // agent assumes tracked[i].classId is missing — adds workaround that re-joins via index
          const enriched = tracked.map((t, i) => ({ ...t, classId: snapshot[i].classId }));
        correct_pattern: |
          // classId already passed through from Detection (which extends Observation)
          const tracked = tracker.update(await detector.detect(imageData));
          for (const t of tracked) console.log(t.trackId, t.classId);
        source: "src/bytetrack/tracker.ts:125-135 (@typeParam T, @returns pass-through), src/yolo/types.ts:14-15"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Treating totalCount as pause-resume safe"
        mechanism: "totalCount returns nextId - 1. Calling tracker.reset() zeros it. Agents implementing 'pause and resume counting' often call reset and then complain that counts restart at 0."
        wrong_pattern: |
          // Pause handling
          tracker.reset(); // clears IDs AND zeros totalCount
          // ... later
          console.log(tracker.totalCount); // 0, surprising
        correct_pattern: |
          // To pause without losing counts, simply stop calling update(); track buffer ages out naturally.
          // To restart fresh, call reset() and accept that counts begin from 0.
          const persisted = tracker.totalCount;
          tracker.reset();
          // explicitly track persisted + new across reset boundaries in app state
        source: "src/bytetrack/tracker.ts:108-116 (reset semantics), tracker.ts:79-86 (totalCount)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Confusing highThresh and newTrackThresh roles"
        mechanism: "highThresh splits Stage 1 vs Stage 2 routing. newTrackThresh gates whether an unmatched observation becomes a NEW track. Defaults are 0.2 and 0.15 — close enough that agents flatten them into one knob, then either generate too many ghost tracks or miss real low-confidence first appearances."
        wrong_pattern: |
          // Tightening to reduce ghost tracks
          new BYTETracker({ highThresh: 0.5, newTrackThresh: 0.5 });
          // result: any object that first appears at 0.4 is dropped, never tracked,
          // even though its later high-conf detections would have associated cleanly.
        correct_pattern: |
          // Keep newTrackThresh strict, let highThresh route low-conf detections into Stage 2 recovery.
          new BYTETracker({ highThresh: 0.2, newTrackThresh: 0.5 });
        source: "src/bytetrack/types.ts:80-106 (per-field roles), src/bytetrack/tracker.ts:151-156"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Redundant Detection → Observation remapping"
        mechanism: "Detection (from yolo) is structurally compatible with Observation (bytetrack input). The TSDoc explicitly states 'can be passed without remapping.' Agents not noticing the structural compatibility write a defensive .map() that copies fields, adding cognitive overhead and at worst dropping pass-through fields like classId."
        wrong_pattern: |
          const detections = await detector.detect(imageData);
          // Unnecessary — also drops classId from pass-through, breaking multi-class flows
          const observations = detections.map((d) => ({
            x1: d.x1, y1: d.y1, x2: d.x2, y2: d.y2, score: d.score,
          }));
          const tracked = tracker.update(observations);
        correct_pattern: |
          // Detection extends Observation structurally; pass through directly.
          // classId rides along on every TrackedBox via the tracker's pass-through generic.
          const tracked = tracker.update(await detector.detect(imageData));
        source: "src/yolo/types.ts:9-15 (@remarks structural compat), src/bytetrack/types.ts:26-34, src/bytetrack/tracker.ts:125-135 (pass-through generic)"
        priority: "HIGH"
        status: "active"
      - mistake: "Single tracker instance for multi-class detectors"
        mechanism: "BYTETracker's IoU-based association is class-agnostic — it does NOT consult classId. Passing detections from multiple classes (e.g. person + bag) into one tracker can swap IDs between classes when boxes overlap. The supported pattern is one BYTETracker per classId."
        wrong_pattern: |
          // Multi-class detector + single tracker — IDs can swap across classes
          const tracker = new BYTETracker();
          const tracked = tracker.update(await detector.detect(imageData));
        correct_pattern: |
          const trackers = new Map<number, BYTETracker>();
          const dets = await detector.detect(imageData);
          const byClass = new Map<number, Detection[]>();
          for (const d of dets) {
            const arr = byClass.get(d.classId) ?? [];
            arr.push(d);
            byClass.set(d.classId, arr);
          }
          const tracked = [...byClass].flatMap(([cls, classDets]) => {
            if (!trackers.has(cls)) trackers.set(cls, new BYTETracker());
            const t = trackers.get(cls);
            if (!t) return [];
            return t.update(classDets);
          });
        source: "src/bytetrack/association.ts:30-39 (iouDistance — no classId reference), maintainer interview"
        priority: "HIGH"
        status: "active"

  - name: "Set up onnxruntime-web for a custom (non-YOLO) model"
    slug: "set-up-onnx-runtime"
    domain: "runtime-setup"
    description: "Use the onnx subpath directly to run any browser-side ONNX model. Covers session creation, RGBA→CHW preprocessing, WebGPU/WASM selection, and SSR safety. Distinct from set-up-detection-pipeline because the user owns the postprocess step. Worker compatibility: every subpath runs in a Web Worker — preprocess, bytetrack, and yolo/postprocess are DOM-free, and since the OffscreenCanvas change the source capturers also run in a worker (they use new OffscreenCanvas(...) when available, falling back to document.createElement only on the main thread). The only main-thread-only operation is consumer-side: captureStream() exists only on HTMLCanvasElement, so narrow capturer.canvas with instanceof first."
    type: "core"
    covers:
      - "initSession (string | ArrayBufferLike | Uint8Array modelPath)"
      - "isWebGpuAvailable"
      - "createPreprocessor / createPreprocessBuffer / rgbaToFloat32Chw"
      - "InitSessionOptions (graphOptimizationLevel, sessionOptions, omitted executionProviders)"
      - "Preprocessor ownership / buffer overwrite semantics"
      - "Worker compatibility: all subpaths run in a worker (source via OffscreenCanvas); only consumer-side captureStream() needs the main thread / instanceof narrowing"
    tasks:
      - "Run a non-YOLO segmentation or pose model in the browser"
      - "Wire SSR-safe inference into a Next.js client component"
      - "Share a single preprocess buffer between detector and another consumer"
      - "Override graphOptimizationLevel for a slow model"
    failure_modes:
      - mistake: "Bypassing the library to call onnxruntime-web directly"
        mechanism: "Agents copying the onnxruntime-web README example import ort and call InferenceSession.create themselves, skipping initSession. This defeats the library's intent: PoC-learned knowledge (dynamic import for SSR safety, executionProvider gating, preprocess buffer reuse) is consolidated INSIDE this package so it can be improved centrally. Direct ORT use bypasses that and re-fragments the knowledge."
        wrong_pattern: |
          // Direct ORT use — bypasses every safeguard this library was built to centralize
          import * as ort from "onnxruntime-web/webgpu";
          const session = await ort.InferenceSession.create(modelPath, {
            executionProviders: ["webgpu"],
          });
          const tensor = new ort.Tensor("float32", float32, [1, 3, 640, 640]);
          const results = await session.run({ input: tensor });
        correct_pattern: |
          // Use the library's entry point — improvements land here for everyone.
          import { initSession } from "@pj-hoakari/web-crowd-detection-utils/onnx";
          const { session, backend } = await initSession(modelPath, {
            executionProvider: "webgpu",
          });
          // For custom models, run session.run yourself; for YOLO use createYoloDetector.
        source: "src/onnx/session.ts (initSession is the entry point), CLAUDE.md (lib-as-knowledge-sink design)"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Adding onnxruntime-web to consumer package.json"
        mechanism: "This library OWNs onnxruntime-web as a direct dependency to eliminate version drift. Agents who see 'import onnxruntime-web' in source often add it to the host app's package.json, ending up with two copies and silent ABI mismatches at WASM load."
        wrong_pattern: |
          // consumer-app/package.json
          {
            "dependencies": {
              "@pj-hoakari/web-crowd-detection-utils": "^0.1.0",
              "onnxruntime-web": "^1.24.0"  // do not add — owned by the library
            }
          }
        correct_pattern: |
          // consumer-app/package.json — onnxruntime-web NOT listed
          {
            "dependencies": {
              "@pj-hoakari/web-crowd-detection-utils": "^0.1.0"
            }
          }
        source: "CLAUDE.md (Runtime deps via dependencies by default), package.json#dependencies"
        priority: "HIGH"
        status: "active"
      - mistake: "Importing onnxruntime-web at module top level"
        mechanism: "initSession uses dynamic import() to keep the module SSR-safe (no navigator.gpu access at evaluation). Wrapping initSession in a module that imports onnxruntime-web statically re-introduces the SSR break."
        wrong_pattern: |
          // detection.ts
          import * as ort from "onnxruntime-web/webgpu"; // top-level — defeats SSR safety
          export async function load() {
            return initSession(path, { executionProvider: "webgpu" });
          }
        correct_pattern: |
          // detection.ts — initSession handles the dynamic import internally
          import { initSession } from "@pj-hoakari/web-crowd-detection-utils/onnx";
          export async function load() {
            return initSession(path, { executionProvider: "webgpu" });
          }
        source: "src/onnx/session.ts:17-23 (@remarks dynamic import for SSR), src/onnx/types.ts:1"
        priority: "HIGH"
        status: "active"
      - mistake: "Trusting isWebGpuAvailable() as a 'safe to run' check"
        mechanism: "isWebGpuAvailable only checks for navigator.gpu presence. The actual GPU adapter may still fail at session create (driver issue, no adapter, browser flag off). Agents who skip the try/catch assume true = OK and crash mid-flow."
        wrong_pattern: |
          if (isWebGpuAvailable()) {
            return await initSession(path, { executionProvider: "webgpu" });
            // throws on Linux with no GPU acceleration, etc.
          }
        correct_pattern: |
          if (isWebGpuAvailable()) {
            try {
              return await initSession(path, { executionProvider: "webgpu" });
            } catch (err) {
              console.warn("WebGPU init failed, falling back", err);
            }
          }
          return initSession(path, { executionProvider: "wasm" });
        source: "src/onnx/backend.ts:8-12 (@remarks 'adapter may still fail')"
        priority: "HIGH"
        status: "active"
      - mistake: "Forgetting Preprocessor buffer overwrite semantics"
        mechanism: "Preprocessor.process returns the same Float32Array instance every call. Storing the result in an array and reading later sees the latest frame — silently breaks batch / async pipelines."
        wrong_pattern: |
          const preprocessor = createPreprocessor(640);
          const batch: Float32Array[] = [];
          for (const frame of frames) batch.push(preprocessor.process(frame));
          // all entries point to the same buffer — last frame everywhere
        correct_pattern: |
          // Either copy per frame...
          for (const frame of frames) batch.push(new Float32Array(preprocessor.process(frame)));
          // ...or use the allocation-per-call form:
          for (const frame of frames) batch.push(rgbaToFloat32Chw(frame, { inputSize: 640 }));
        source: "src/onnx/preprocess.ts:96-110, src/onnx/types.ts:64-86 (@remarks overwrite)"
        priority: "HIGH"
        status: "active"
      - mistake: "Forcing executionProviders via sessionOptions with `as any`"
        mechanism: "InitSessionOptions.sessionOptions is typed as Omit<..., 'executionProviders'>. The library forwards executionProvider (singular) as the sole knob. Agents copying raw ORT examples paste an executionProviders array; TypeScript blocks it; the agent escape-hatches with `as any` and ends up with confusing 'two providers' behavior or a silent override. The Omit is the API contract — treat any cast-around as a bug."
        wrong_pattern: |
          // TypeScript said no — agent reaches for `as any` instead of fixing the call
          await initSession(path, {
            executionProvider: "webgpu",
            sessionOptions: { executionProviders: ["wasm"] as any },
          });
        correct_pattern: |
          // Use executionProvider (singular). To switch backends, change that field.
          await initSession(path, { executionProvider: "wasm" });
        source: "src/onnx/types.ts:38-45 (Omit is intentional), src/onnx/session.ts:44-48"
        priority: "HIGH"
        status: "active"

  - name: "Suppress static false positives with the background model"
    slug: "suppress-static-detections"
    domain: "static-suppression"
    description: "Add the detector-agnostic BackgroundSubtractor to a working detection loop to cut persistent false positives on static scenery (posters, mannequins, parked objects). The developer reaches for this once detection works but background clutter keeps producing phantom detections. suppressStatic only attenuates the score of boxes in static regions — it never removes them — so the consumer performs the actual exclusion (cutout / threshold) downstream."
    type: "core"
    covers:
      - "BackgroundSubtractor (constructor, update, suppressStatic, foregroundRatio, reset)"
      - "Box / ScoredBox (structurally compatible with Detection / Observation / TrackedBox — no remap)"
      - "BackgroundSubtractorOptions (width, height, alpha, diffThreshold, minForegroundRatio)"
      - "DEFAULT_WIDTH / DEFAULT_HEIGHT / DEFAULT_ALPHA / DEFAULT_DIFF_THRESHOLD / DEFAULT_MIN_FOREGROUND_RATIO"
      - "Statefulness: warm-up frame, update() ready boolean, reset() on source switch"
      - "Background-model pixel space (must match the box space; apply BEFORE the reverse transform)"
    tasks:
      - "Add background subtraction to a working YOLO pipeline to suppress static false positives"
      - "Feed bytetrack Observations / TrackedBoxes through suppressStatic (detector-agnostic)"
      - "Reset the background model after switching video sources"
      - "Tune alpha / diffThreshold / minForegroundRatio for a given scene"
    failure_modes:
      - mistake: "Hand-rolling background subtraction instead of using BackgroundSubtractor"
        mechanism: "The package consolidates the background-subtraction PoC (BT.601 luma, EMA model, 3×3 morphological open, warm-up handling) inside BackgroundSubtractor so it can be improved centrally. Re-implementing frame-differencing in app code re-fragments that knowledge and typically drops the morphological denoise and warm-up steps."
        wrong_pattern: |
          // App code re-implements EMA background subtraction by hand
          const bg = new Float32Array(w * h);
          for (const frame of frames) {
            // manual grayscale + EMA + threshold, no morphological denoise,
            // no warm-up handling — diverges from the library
          }
        correct_pattern: |
          import { BackgroundSubtractor } from "@pj-hoakari/web-crowd-detection-utils/background";
          const bg = new BackgroundSubtractor({ width: 640, height: 640 });
          const ready = bg.update(imageData);
          if (ready) detections = bg.suppressStatic(detections, 0.3);
        source: "maintainer interview (Q6), CLAUDE.md (lib-as-knowledge-sink design), src/background/subtractor.ts:10-47"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Applying suppressStatic after the reverse transform (wrong coordinate space)"
        mechanism: "suppressStatic / foregroundRatio measure boxes in the background model's pixel space — the width×height the subtractor was constructed with, which equals the frame fed to update(). createYoloDetector returns boxes in model-input space (0..inputSize). Reverse-transforming to source space FIRST and then calling suppressStatic against a model-input-sized subtractor clamps every box to the 0..inputSize bounds and reads wrong foreground ratios — silently, with no throw."
        wrong_pattern: |
          const { imageData, params } = capturer.capture(video); // 640×640
          let dets = await detector.detect(imageData);            // model space
          const sourceSpace = reverseLetterboxBoxes(dets, params); // 1280×720 space
          bg.update(imageData);
          // WRONG: source-space boxes against a 640×640 subtractor
          const suppressed = bg.suppressStatic(sourceSpace, 0.3);
        correct_pattern: |
          const { imageData, params } = capturer.capture(video); // 640×640
          let dets = await detector.detect(imageData);            // model space
          const ready = bg.update(imageData);                     // SAME 640×640 frame
          if (ready) dets = bg.suppressStatic(dets, 0.3);         // spaces match
          const sourceSpace = reverseLetterboxBoxes(dets, params);
          const tracked = tracker.update(sourceSpace);
        source: "src/background/types.ts:1-21 (Box is in background-model pixel space), src/background/subtractor.ts:122-127 (update dim check), maintainer interview (Q2)"
        priority: "CRITICAL"
        status: "active"
        skills: ["suppress-static-detections", "handle-frame-coordinates", "integrate-tracking"]
      - mistake: "Expecting suppressStatic to drop boxes"
        mechanism: "suppressStatic returns a copy in which static boxes have score *= suppressFactor; the boxes are still present. Treating it as a filter (expecting the array to shrink) leaves attenuated static detections in the pipeline — they reappear in rendering or tracking unless the caller applies its own cutout / threshold on the new scores."
        wrong_pattern: |
          const kept = bg.suppressStatic(dets, 0); // assume static boxes are gone
          for (const d of kept) ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
          // static boxes still drawn — score is 0 but the box was never removed
        correct_pattern: |
          const adjusted = bg.suppressStatic(dets, 0.3);
          // suppressStatic only lowers score — perform the actual exclusion downstream
          const kept = adjusted.filter((d) => d.score >= confCutoff);
        source: "src/background/subtractor.ts:200-241 (returns copy with scaled score, no removal), maintainer interview (Q3)"
        priority: "HIGH"
        status: "active"
      - mistake: "Suppressing on the warm-up frame / ignoring update()'s return"
        mechanism: "update() returns false on the first frame (and the first after reset()) while the background is being seeded; until a valid mask exists, foregroundRatio returns 0 for every box, so every box falls below minForegroundRatio and suppressStatic attenuates ALL detections. Calling suppressStatic without gating on the boolean zeroes/attenuates the entire first frame."
        wrong_pattern: |
          bg.update(imageData);                 // return value ignored
          dets = bg.suppressStatic(dets, 0.3);  // frame 1: every detection attenuated
        correct_pattern: |
          const ready = bg.update(imageData);
          if (ready) dets = bg.suppressStatic(dets, 0.3); // skip until the mask is valid
        source: "src/background/subtractor.ts:104-167 (update returns false on first frame), :169-199 (foregroundRatio 0 before mask), subtractor.ts:34-46 (TSDoc @example)"
        priority: "HIGH"
        status: "active"
      - mistake: "Default alpha absorbs stationary people into the background"
        mechanism: "The background is an EMA with alpha (default 0.01 ≈ 3–4 s to merge at 30 fps). Anything that stays still long enough — including real people standing in a crowd — merges into the background and its detections are attenuated as 'static'. Enabling suppression to clean up posters can silently lose stationary people, defeating the crowd-counting goal."
        wrong_pattern: |
          // Faster adaptation 'to react quicker' — stationary people vanish sooner
          const bg = new BackgroundSubtractor({ width: 640, height: 640, alpha: 0.1 });
        correct_pattern: |
          // Crowds with stationary subjects: adapt the background SLOWLY so real
          // people stay foreground longer. Lower alpha (or raise diffThreshold) and
          // verify on footage with standing subjects before shipping.
          const bg = new BackgroundSubtractor({ width: 640, height: 640, alpha: 0.005 });
        source: "src/background/constants.ts:13-30 (alpha / diffThreshold / minForegroundRatio rationale), maintainer interview (Q5 — tuning left to per-scene judgment)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Not calling reset() after switching sources"
        mechanism: "The learned background describes the scene it was trained on. After switching video sources without reset(), the stale model treats the new scene's genuinely-static regions as foreground (and old motion regions as background), mis-suppressing for many frames until alpha slowly relearns."
        wrong_pattern: |
          video.src = nextClipUrl;             // new scene, same subtractor
          const ready = bg.update(imageData);  // stale background, wrong mask for many frames
        correct_pattern: |
          video.src = nextClipUrl;
          bg.reset(); // discard the old scene; next update() re-seeds (returns false once)
        source: "src/background/subtractor.ts:243-253 (reset @remarks: use after switching sources)"
        priority: "MEDIUM"
        status: "active"

  - name: "Count tracked objects crossing virtual lines"
    slug: "count-line-crossings"
    domain: "line-crossing-counting"
    description: "Tally how many tracked objects cross each virtual line, per direction, with LineCrossingCounter. A post-tracking stage: the caller reduces each tracked detection to an anchor point (e.g. foot) and passes { trackId, point } plus the lines (each defined by its two anchor endpoints). Detector- and tracker-agnostic, stateful, no drawing. Optional crossing-assist (rescue / cooldown) compensates for tracker ID churn."
    type: "core"
    covers:
      - "LineCrossingCounter (update, getLineCount, getAllCounts, reset, resetCounts, clearPositions, removeLine)"
      - "Line { id, p1, p2 } (two anchor endpoints), Point, TrackedPoint { trackId, point }, LineCount { forward, backward }"
      - "Crossing test: side-of-line (2-D cross product) + segment intersection"
      - "Statefulness: one instance per stream, prev-point comparison, caller-computed anchor"
      - "Shared coordinate space (counter does no scaling)"
      - "CrossingAssistConfig + DEFAULT_RESCUE_DISTANCE / DEFAULT_RESCUE_FRAMES / DEFAULT_COOLDOWN_FRAMES (rescue / cooldown)"
    tasks:
      - "Count people crossing an entry/exit line (in/out) on a tracked stream"
      - "Add line-crossing counting after createYoloDetector + BYTETracker"
      - "Enable crossing-assist to survive tracker ID switches at the line"
      - "Reset counts / positions when switching sources or clips"
    failure_modes:
      - mistake: "Hand-rolling line-crossing detection instead of using LineCrossingCounter"
        mechanism: "The package consolidates the proven crossing test (cross-product side + segment intersection) and the ID-churn assist (rescue / cooldown) inside LineCrossingCounter. Re-implementing it per app re-fragments that logic and usually drops the segment-intersection guard (counting points that cross the infinite line outside the segment) and the assist."
        wrong_pattern: |
          // App code re-implements side-of-line + prev-point tracking by hand,
          // typically with no segment-intersection guard and no ID-churn assist.
          const prev = new Map<number, { x: number; y: number }>();
          for (const t of tracked) {
            // manual cross product, manual counting, manual prevPoint bookkeeping...
          }
        correct_pattern: |
          import { LineCrossingCounter } from "@pj-hoakari/web-crowd-detection-utils/line-crossing";
          const counter = new LineCrossingCounter();
          const points = tracked.map((t) => ({
            trackId: t.trackId,
            point: { x: (t.x1 + t.x2) / 2, y: t.y2 },
          }));
          counter.update(points, lines, { assist: { enabled: true } });
        source: "maintainer interview (Q2), CLAUDE.md (lib-as-knowledge-sink design), src/line-crossing/counter.ts"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Points and lines in mismatched coordinate spaces"
        mechanism: "LineCrossingCounter does no scaling — the tracked points and every Line endpoint must live in ONE coordinate space. Defining lines in detection (640) space while passing source-space points (or vice versa) tests crossings against the wrong geometry and silently produces wrong counts, with no error."
        wrong_pattern: |
          const lines = [{ id: "door", p1: { x: 320, y: 0 }, p2: { x: 320, y: 640 } }]; // 640 space
          const sourceSpace = reverseLetterboxBoxes(dets, params);                       // 1280×720
          const points = tracked.map((t) => ({
            trackId: t.trackId, point: { x: (t.x1 + t.x2) / 2, y: t.y2 },
          })); // tracked is in source space → mismatched with 640-space lines
          counter.update(points, lines);
        correct_pattern: |
          // Keep lines and points in the SAME space. Define the lines in the space
          // your tracked boxes use, then anchor points from those boxes.
          const points = tracked.map((t) => ({
            trackId: t.trackId, point: { x: (t.x1 + t.x2) / 2, y: t.y2 },
          }));
          counter.update(points, linesInTrackedSpace, { assist: { enabled: true } });
        source: "src/line-crossing/types.ts:1-40 (Line / Point shared space), src/line-crossing/counter.ts (no scaling), maintainer interview (Q2)"
        priority: "CRITICAL"
        status: "active"
        skills: ["count-line-crossings", "handle-frame-coordinates", "integrate-tracking"]
      - mistake: "Re-instantiating LineCrossingCounter per frame"
        mechanism: "The counter is stateful — it compares each track's point this frame against the point it held last frame. A per-frame instance has no previous point, so no crossing is ever detected and every line stays at zero."
        wrong_pattern: |
          for (const frame of frames) {
            const counter = new LineCrossingCounter(); // fresh state every frame
            counter.update(points, lines, { assist: { enabled: true } });
            // counts never advance — no previous point to compare against
          }
        correct_pattern: |
          const counter = new LineCrossingCounter(); // once, outside the loop
          for (const frame of frames) {
            counter.update(points, lines, { assist: { enabled: true } });
          }
        source: "src/line-crossing/counter.ts (prevPoint state across frames), maintainer interview (Q2)"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Expecting the counter to compute the anchor point itself"
        mechanism: "update consumes TrackedPoint { trackId, point }, not bounding boxes — it never reads x1..y2. The anchor choice (foot, centroid, head) is the caller's. Passing raw tracked boxes is a type error, and casting around it leaves the counter reading undefined coordinates."
        wrong_pattern: |
          // Passing raw tracked boxes — the counter does not derive a point from them
          counter.update(tracked as unknown as TrackedPoint[], lines);
        correct_pattern: |
          // Caller reduces each detection to ITS chosen anchor point (foot here)
          const points = tracked.map((t) => ({
            trackId: t.trackId,
            point: { x: (t.x1 + t.x2) / 2, y: t.y2 },
          }));
          counter.update(points, lines);
        source: "src/line-crossing/types.ts (TrackedPoint), src/line-crossing/counter.ts (update signature)"
        priority: "HIGH"
        status: "active"
      - mistake: "Skipping crossing-assist under ID churn / misreading cooldown"
        mechanism: "With assist off, a tracker ID switch at the line (track lost on one side, a new id appears on the other) is missed, and line jitter can double-count one person. Enabling assist turns on rescue (a new id inherits a just-lost track's history near the same point) and cooldown (repeat counts on the same line are suppressed for a few frames)."
        wrong_pattern: |
          // Assist off — an ID switch at the line is missed; jitter double-counts
          counter.update(points, lines);
        correct_pattern: |
          counter.update(points, lines, {
            // rescueDistance / rescueFrames / cooldownFrames default to proven values
            assist: { enabled: true },
          });
        source: "src/line-crossing/counter.ts (rescue / cooldown), src/line-crossing/constants.ts, maintainer interview (Q3)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Assuming forward always means left-to-right"
        mechanism: "forward / backward are defined by the side transition relative to the directed line p1→p2 (the sign of the 2-D cross product), not by screen left/right. Swapping a line's p1 and p2 flips forward and backward, so an agent that hard-codes 'forward = entering' mislabels direction for some line orientations."
        wrong_pattern: |
          // Assuming forward is always the 'in' direction regardless of p1/p2 order
          const entering = counter.getLineCount("door").forward;
        correct_pattern: |
          // Direction follows how YOU set p1/p2. Verify which side is "in" for your
          // line orientation (or normalize p1/p2 so forward consistently = entering).
          const { forward, backward } = counter.getLineCount("door");
          const entering = forward; // only after confirming the p1→p2 orientation
        source: "src/line-crossing/counter.ts (sideOf sign → forward/backward), src/line-crossing/types.ts (LineCount doc)"
        priority: "MEDIUM"
        status: "active"

tensions:
  - name: "Convenience default vs explicit-format-clarity"
    skills: ["set-up-detection-pipeline", "configure-yolo-postprocess"]
    description: "DEFAULT_FORMAT is 'end-to-end' (matches NMS-included exports). Examples favor 'auto'. The library default optimizes for production-grade exports; the examples optimize for first-run success."
    implication: "Agent reads first-time tutorial that omits 'format' and reproduces the default; on a stock Ultralytics export this throws a shape mismatch. Agent then assumes the library is broken rather than setting format: 'auto'."

  - name: "Stateful tracker vs functional-style pipelines"
    skills: ["integrate-tracking", "set-up-detection-pipeline"]
    description: "Detection is functional (per-call), tracking is stateful (per-instance). Agents naturally write 'pipeline = detect.then(track)' as a pure function and re-instantiate BYTETracker inside, breaking IDs."
    implication: "Crowd-counting features look like they work (current count is correct) but unique counts equal current counts — the entire purpose of tracking silently fails."

  - name: "Library-owned onnxruntime-web vs consumer version pinning"
    skills: ["set-up-onnx-runtime"]
    description: "Owning onnxruntime-web as a direct dependency eliminates version drift but removes the consumer's control over the runtime version. Agents who see import 'onnxruntime-web' often add it to consumer deps reflexively."
    implication: "Double-bundling onnxruntime-web silently breaks at runtime (WASM module mismatch). The error is opaque and the fix (delete from consumer package.json) is non-obvious."

  - name: "Letterbox correctness vs stretch simplicity"
    skills: ["handle-frame-coordinates", "set-up-detection-pipeline"]
    description: "Stretch capture is one fewer call (no params to thread through) and works fine on square / near-square sources. Letterbox preserves aspect but requires plumbing LetterboxParams through to the reverse transform."
    implication: "Agent picks stretch by default for code-shortness and gets dropped recall on 16:9 webcam streams. The model 'works' but accuracy is mysteriously worse than the reference."

  - name: "Static suppression vs stationary-crowd recall"
    skills: ["suppress-static-detections", "integrate-tracking"]
    description: "Background subtraction removes false positives on static scenery, but with the same alpha a genuinely stationary person merges into the background and is attenuated as 'static'."
    implication: "Agent enables suppressStatic to clean up posters / mannequins and silently drops people who stand still long enough to merge into the EMA background — the opposite of the crowd-counting goal."

  - name: "Crossing accuracy vs tracker ID stability"
    skills: ["count-line-crossings", "integrate-tracking"]
    description: "Accurate per-line crossing counts depend on a single stable trackId persisting across the line; tracker tuning that is fine for live counts (short trackBuffer, strict newTrackThresh) increases ID switches exactly at the line."
    implication: "An agent tunes the tracker for one goal (e.g. fewer ghost tracks) and silently degrades crossing accuracy; crossing-assist mitigates but cannot fully recover a lost ID."

